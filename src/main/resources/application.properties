# Reduce logging for Spring Security's internal exception handling layer.
# This filter is responsible for catching exceptions thrown inside the security filter chain.
# Setting it to ERROR prevents Spring from printing stack traces for 401/403 errors.
logging.level.org.springframework.security.web.access.ExceptionTranslationFilter=ERROR

# Reduce logging for Spring Security's authentication mechanisms.
# This includes failures during login, token parsing, and authentication filters.
# Without this, Spring prints noisy WARN/INFO logs every time authentication fails.
logging.level.org.springframework.security.web.authentication=ERROR

# Reduce logging for ALL Spring Security web components.
# This covers filters, handlers, and internal security infrastructure.
# Setting this to ERROR ensures only *real* errors are logged, not normal auth failures.
logging.level.org.springframework.security.web=ERROR

# Global logging level for the entire Spring Security framework.
# This is the master switch: it suppresses all non-critical logs from Spring Security.
# Without this, Spring Security prints stack traces even when your API returns clean JSON.
logging.level.org.springframework.security=ERROR
